name: Integration Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: mewants
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL_RUNTIME: postgresql://postgres:password@localhost:5432/mewants
      DATABASE_URL_BUILDTIME: postgresql://postgres:password@localhost:5432/mewants
      BETTER_AUTH_SECRET: test_placeholder
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v6
      - name: Install Dependencies
        run: pnpm ci
      - name: Push Database Schema
        run: pnpm run db:push
      - name: Run Integration Tests
        run: pnpm run test:integration
